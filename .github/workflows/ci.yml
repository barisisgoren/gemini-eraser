name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Caching disabled to clear pnpm detection issues
          # cache: 'npm' 

      - name: Install dependencies
        run: npm install # Using install instead of ci for fresh regeneration if needed

      - name: Validate sample fixtures
        run: |
          if [ ! -d src/assets/samples ] || [ -z "$(ls -A src/assets/samples)" ]; then
            echo "Missing regression fixtures in src/assets/samples"
            exit 1
          fi

      - name: Install Playwright Chromium
        run: npm exec playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
